services:
  - type: web
    name: cometpulse-bot
    env: node
    plan: free
    buildCommand: corepack enable && pnpm install && pnpm --filter @workspace/discord-bot run db:push && pnpm --filter @workspace/api-server run build
    startCommand: npx concurrently --kill-others "pnpm --filter @workspace/api-server run start" "pnpm --filter @workspace/discord-bot run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: cometpulse-dashboard
    env: node
    plan: free
    buildCommand: corepack enable && pnpm install && pnpm --filter @workspace/dashboard run build
    startCommand: pnpm --filter @workspace/dashboard run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BOT_API_URL
        sync: false
      - key: BASE_URL
        sync: false
